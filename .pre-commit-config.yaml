# Pre-commit 钩子配置
# 安装: pre-commit install
# 跳过: git commit --no-verify
#
# 工作原理:
#   git commit → Git 自动执行 .git/hooks/pre-commit
#   → 该脚本读取本文件 → 按定义顺序执行各检查项
#   → 全部通过才允许提交
#
# 兜底盲区提示只关注未纳入任何业务域 hook 的路径；tests/<domain>/ 已随对应域 hook 覆盖。
# ──────────────────────────────────────────────────────────────────────────
# 【模式：按业务域增量，统一调用 scripts/test.sh】
#
# 两层职责（与 directory-roadmap 原则 8 对齐）：
#   - 本文件 = 触发层：哪个业务域被改动就触发哪个域的检查（files 正则匹配）
#   - scripts/test.sh = 内容层：跑什么检查、什么口径、域→路径映射的单一事实来源
#
# 每个业务域一个 hook：改到 <domain>/ 时触发 `scripts/test.sh all <domain>`，
# 一次跑完该域的 lint + format + type + unit + coverage fail-under，只验该域、不碰其他域。
#   - coverage 阈值按业务域设置，不设置全仓库整体阈值。
#   - pass_filenames: false —— 不把改动文件追加到 entry，避免污染 <domain> 参数；
#     files 正则只用于「是否触发」判断，实际范围由 scripts/test.sh 的域映射决定。
#   - always_run 一律为 false（默认）—— 没改到的域不跑。
#
# 全量回归（跨域影响、common 波及面）靠显式 `bash scripts/test.sh` 或 CI 兜底。
# 「某域测试覆盖不全」是 tests 自身的完备性问题，与本触发流程正交。
# 阶段 F 起，commit 对被触发业务域执行 coverage fail-under 并阻塞失败。
# tests 根级、helpers、conftest 等共享测试改动必须触发全量测试，确保所有测试文件
# 都有机会在 commit 时触发。
#
# ⚠️ 改动本文件或 scripts/test.sh 的验证分工前，先读 scripts/test.sh 顶部的
#    「设计 / 给 AI 的提醒」，与用户对齐后再动。
# ──────────────────────────────────────────────────────────────────────────

# 多工具链：report 域含 Python(workspace/report/) + 前端(workspace/report/web/) 两种形态。
#   verify-report 一个 hook 覆盖前后端：改 workspace/report/ 任何文件都跑 Python(ruff+mypy+
#   pytest) + 前端(eslint+tsc+vitest)。前后端强交互，流程上一起验。
#   （注：前/后端各自是否覆盖数据协议变动，是测试自身完备性问题，与此流程决策正交。）
#
# ⚠️ 改动本文件或 scripts/test.sh 的验证分工前，先读 scripts/test.sh 顶部的
#    「设计 / 给 AI 的提醒」，与用户对齐后再动。
# ──────────────────────────────────────────────────────────────────────────

repos:
  - repo: local
    hooks:
      - id: verify-common
        name: verify common (scripts/test.sh all common)
        entry: bash scripts/test.sh all common
        language: system
        files: ^(workspace/common/|workspace/tests/common/)
        pass_filenames: false

      - id: verify-config
        name: verify config (scripts/test.sh all config)
        entry: bash scripts/test.sh all config
        language: system
        files: ^(workspace/config/|workspace/tests/config/)
        pass_filenames: false

      - id: verify-data
        name: verify data (scripts/test.sh all data)
        entry: bash scripts/test.sh all data
        language: system
        files: ^(workspace/data/|workspace/tests/data/)
        pass_filenames: false

      - id: verify-backtest
        name: verify backtest (scripts/test.sh all backtest)
        entry: bash scripts/test.sh all backtest
        language: system
        files: ^(workspace/backtest/|workspace/tests/backtest/)
        pass_filenames: false

      - id: verify-clearing
        name: verify clearing (scripts/test.sh all clearing)
        entry: bash scripts/test.sh all clearing
        language: system
        files: ^(workspace/clearing/|workspace/tests/clearing/)
        pass_filenames: false

      - id: verify-strategies
        name: verify strategies (scripts/test.sh all strategies)
        entry: bash scripts/test.sh all strategies
        language: system
        files: ^(workspace/strategies/|workspace/tests/strategies/)
        pass_filenames: false

      - id: verify-report
        name: verify report py+web (scripts/test.sh all report)
        entry: bash scripts/test.sh all report
        language: system
        files: ^(workspace/report/|workspace/tests/report/)
        pass_filenames: false

      - id: verify-cli
        name: verify cli (scripts/test.sh all cli)
        entry: bash scripts/test.sh all cli
        language: system
        files: ^(workspace/cli/|workspace/tests/cli/)
        pass_filenames: false

      - id: verify-contracts
        name: verify contracts (scripts/test.sh all contracts)
        entry: bash scripts/test.sh all contracts
        language: system
        files: ^(workspace/packages/python-contracts/|workspace/tests/contracts/)
        pass_filenames: false

      - id: verify-research
        name: verify research (scripts/test.sh all research)
        entry: bash scripts/test.sh all research
        language: system
        files: ^(workspace/research/|workspace/tests/research/)
        pass_filenames: false

      - id: verify-tests-shared
        name: verify shared tests (scripts/test.sh)
        entry: bash scripts/test.sh
        language: system
        files: ^workspace/tests/(__init__\.py|conftest\.py|README\.md|helpers/.*|test_[^/]+\.py)$
        pass_filenames: false

      # 兜底：检测落在所有测试 hook 之外的改动文件（如 main.py / pyproject.toml /
      # scripts/ / 根级新文件）。always_run + 不设 files = 每次 commit 都跑、收到全部
      # 改动文件；脚本只提示不拦截（exit 0）。目的是让盲区文件在 commit 输出里可见，
      # AI 据此判断是否提醒用户，避免「长期无人注意的未覆盖文件」。
      - id: uncovered-changes
        name: uncovered changes notice (scripts/test.sh _uncovered)
        entry: bash scripts/test.sh _uncovered
        language: system
        always_run: true
        pass_filenames: true
        verbose: true  # Passed 也显示输出，否则提示会被 pre-commit 吞掉，AI 看不到
