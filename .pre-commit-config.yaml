# Pre-commit 钩子配置
# 安装: pre-commit install
# 跳过: git commit --no-verify
#
# 工作原理:
#   git commit → Git 自动执行 .git/hooks/pre-commit
#   → 该脚本读取本文件 → 按定义顺序执行各检查项
#   → 全部通过才允许提交
#
# ──────────────────────────────────────────────────────────────────────────
# 【模式：统一调用 scripts/test.sh】
# 所有检查项都委托给 scripts/test.sh 的子命令，验证口径只有那一处事实来源，
# 避免 pre-commit / CI / 人 / AI 各拼一套导致范围漂移。
#   ruff lint   → scripts/test.sh lint    （只检查不 --fix，纯门槛不改文件）
#   ruff format → scripts/test.sh format  （--check 只报告不重写）
#   mypy        → scripts/test.sh type
#   pytest      → scripts/test.sh unit
# 当前为全量门槛（always_run）；未来若要改增量/分阶段，先读 scripts/test.sh
# 顶部的「演进规划 / 给 AI 的提醒」，与用户对齐后再动。
# ──────────────────────────────────────────────────────────────────────────

repos:
  - repo: local
    hooks:
      # === Python Lint (ruff check) ===
      - id: lint
        name: ruff lint (scripts/test.sh lint)
        entry: bash scripts/test.sh lint
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      # === Python Format 检查 (ruff format --check) ===
      - id: format
        name: ruff format check (scripts/test.sh format)
        entry: bash scripts/test.sh format
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      # === 类型检查 (mypy) ===
      - id: type
        name: mypy type check (scripts/test.sh type)
        entry: bash scripts/test.sh type
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      # === 单元测试 (pytest) ===
      - id: unit
        name: pytest (scripts/test.sh unit)
        entry: bash scripts/test.sh unit
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
