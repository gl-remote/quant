[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "quantsmith-contracts"
version = "0.1.0"
description = "Python schema loader and validator for Quantsmith shared contracts"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"

dependencies = [
    "jsonschema>=4.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
