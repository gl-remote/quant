# 策略工具箱 - 本机环境覆盖模板
# 使用方法：
# 1. 复制此文件为对应环境的 local 配置，例如：
#      workspace/config/conf.backtest.local.toml
#      workspace/config/conf.test.local.toml
#      workspace/config/conf.live.local.toml
# 2. 填写真实的本机配置或密钥。
# 3. conf.*.local.toml 已被 .gitignore 忽略，不要提交。
#
# 加载顺序：
#   conf.toml -> conf.<env>.toml -> conf.<env>.local.toml
#
# API 凭证优先级：
#   方式 A: 环境变量 TQSDK_API_KEY / TQSDK_API_SECRET
#   方式 B: 当前环境的 conf.<env>.local.toml
#   方式 C: conf.toml 中的占位配置不会生成账户信息

# ============================================================
# 本地环境配置
# ============================================================
[environment]
name = "local"
debug = true

# ============================================================
# 天勤账号配置
# ============================================================
[[third_party.services]]
name = "tqsdk"
provider = "tianqin"
api_key = "YOUR_TQ_API_KEY"
api_secret = "YOUR_TQ_API_SECRET"
account_type = "tqsim"          # tqsim / tqkq / tqaccount
broker_id = ""                  # account_type=tqaccount 时必填
broker_user = ""
broker_password = ""
enabled = true

# ============================================================
# 可选：只在当前本机环境覆盖参数优化配置
# ============================================================
# [optimizer]
# n_trials = 50
# early_stop_patience = 5

# ============================================================
# 可选：只在当前本机环境覆盖策略参数
# ============================================================
# [[strategies]]
# name = "ma"
# sma_short = 10
# sma_long = 40
# stop_loss_ratio = 0.03
# take_profit_ratio = 0.05
# position_ratio = 0.1
