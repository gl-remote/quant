# 策略工具箱 - 通用配置文件
# 此文件提交到版本控制，包含通用配置和占位符

# ============================================================
# 基础配置
# ============================================================
[app]
name = "策略工具箱"
version = "0.4.0-dev"
mode = "test"                # test/backtest/live

# ============================================================
# 环境配置
# ============================================================
[environment]
name = "development"         # development/test/production
debug = true

# ============================================================
# 策略配置 (支持多策略)
# ============================================================
# 每个策略一项，通过 --strategy 参数名匹配 (e.g. python main.py backtest --strategy ma)
[[strategies]]
name = "ma"                   # 均线交叉策略
enabled = true
sma_short = 3                 # 短期均线周期（缩短，频繁交叉）
sma_long = 10                 # 长期均线周期（缩短，频繁交叉）
stop_loss_ratio = 0.3         # 止损比例 (30%，放宽)
take_profit_ratio = 0.5       # 止盈比例 (50%，放宽)
position_ratio = 1.0          # 仓位比例 (100%，满仓)
kline_period = 1              # K线周期 (分钟)
atr_period = 14               # ATR 指标计算周期
atr_stop_loss_multiplier = 5.0  # ATR 止损倍数（大幅放宽，不易止损）
atr_take_profit_multiplier = 5.0 # ATR 止盈倍数（大幅放宽，不易止盈）
kdj_oversold = 30             # KDJ 超卖阈值
kdj_overbought = 70           # KDJ 超买阈值
trailing_activation_atr = 0.1  # 移动止损激活阈值（极低，快速激活）
trailing_drawdown_ratio = 0.5  # 移动止损回撤比例（大幅放宽，不易触发）

  # 参数搜索空间 (同时支持 grid 和 bayesian 模式)
  [strategies.search_space.atr_stop_loss_multiplier]
  type = "float"
  low = 2.6
  high = 3.0
  step = 0.1

  [strategies.search_space.atr_take_profit_multiplier]
  type = "float"
  low = 2.3
  high = 2.7
  step = 0.1

  [strategies.search_space.trailing_activation_atr]
  type = "float"
  low = 0.7
  high = 1.1
  step = 0.1

  [strategies.search_space.trailing_drawdown_ratio]
  type = "float"
  low = 0.1
  high = 0.3
  step = 0.1

  [strategies.search_space.kdj_oversold]
  type = "int"
  low = 23
  high = 27
  step = 1

  [strategies.search_space.kdj_overbought]
  type = "int"
  low = 58
  high = 62
  step = 1

[[strategies]]
name = "atr"                  # ATR 风控策略
enabled = true
sma_short = 3                 # 短期均线周期（缩短，频繁交叉）
sma_long = 10                 # 长期均线周期（缩短，频繁交叉）
stop_loss_ratio = 0.3         # 止损比例 (30%，放宽)
take_profit_ratio = 0.5       # 止盈比例 (50%，放宽)
position_ratio = 1.0          # 仓位比例 (100%，满仓)
kline_period = 1              # K线周期 (分钟)
atr_period = 14               # ATR 指标计算周期
atr_stop_loss_multiplier = 5.0  # ATR 止损倍数（大幅放宽，不易止损）
atr_take_profit_multiplier = 5.0 # ATR 止盈倍数（大幅放宽，不易止盈）
kdj_oversold = 30             # KDJ 超卖阈值
kdj_overbought = 70           # KDJ 超买阈值
trailing_activation_atr = 0.1  # 移动止损激活阈值（极低，快速激活）
trailing_drawdown_ratio = 0.5  # 移动止损回撤比例（大幅放宽，不易触发）

  # 参数搜索空间 (同时支持 grid 和 bayesian 模式)
  [strategies.search_space.atr_stop_loss_multiplier]
  type = "float"
  low = 2.6
  high = 3.0
  step = 0.1

  [strategies.search_space.atr_take_profit_multiplier]
  type = "float"
  low = 2.3
  high = 2.7
  step = 0.1

  [strategies.search_space.trailing_activation_atr]
  type = "float"
  low = 0.7
  high = 1.1
  step = 0.1

  [strategies.search_space.trailing_drawdown_ratio]
  type = "float"
  low = 0.1
  high = 0.3
  step = 0.1

  [strategies.search_space.kdj_oversold]
  type = "int"
  low = 23
  high = 27
  step = 1

  [strategies.search_space.kdj_overbought]
  type = "int"
  low = 58
  high = 62
  step = 1

