# ============================================================
# 数据配置 (数据源 + 存储 + 导出)
# ============================================================
[data]
provider = "tqsdk"                          # export 默认数据源
cache_enabled = false                        # 是否启用缓存
base_dir = "project_data"                     # 项目本地数据根目录
export_dir = "project_data/market_data/csv"    # CSV 导出目录
db_path = "project_data/database/quant_shared.db"  # 数据库路径
filename_template = "{symbol}.{provider}.{interval}.csv"  # 文件名模板：标的名.数据源.周期.csv

# ============================================================
# 第三方服务配置
# ============================================================
[[third_party.services]]
name = "tqsdk"                  # 天勤量化
provider = "tianqin"            # 提供商
api_key = "PLACEHOLDER_API_KEY" # 请在 config/conf.local.toml 中填写真实密钥
api_secret = "PLACEHOLDER_API_SECRET"
account_type = "tqsim"          # tqsim 本地模拟 / tqkq 快期模拟 / tqaccount 实盘
broker_id = ""                  # account_type=tqaccount 时必填
broker_user = ""
broker_password = ""
enabled = true
# 未来可扩展更多服务：
# [[third_party.services]]
# name = "binance"
# provider = "binance"
