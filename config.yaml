# 天勤量化交易系统配置文件
# 请勿将此文件提交至版本控制系统，建议设置文件权限为600

tq_account:
  # 天勤量化平台API密钥标识
  # 格式要求：字符串类型，从天勤量化平台获取
  api_key: 'REDACTED_API_KEY'

  # 天勤量化平台API密钥
  # 格式要求：字符串类型，包含字母、数字和特殊字符
  # 安全建议：建议使用环境变量或加密存储方式，不要明文存储在配置文件中
  api_secret: 'REDACTED_API_SECRET'

trading:
  # 止损比例 (0.03 = 3%)
  stop_loss_ratio: 0.03
  
  # 止盈比例 (0.05 = 5%)
  take_profit_ratio: 0.05
  
  # 仓位比例 (0.1 = 10%)
  position_ratio: 0.1
  
  # 短期均线周期
  sma_short: 5
  
  # 长期均线周期
  sma_long: 20

