# 第三方服务配置
third_party:
  services:
    - name: "tqsdk"                  # 天勤量化
      provider: "tianqin"
      api_key: 'REDACTED_API_KEY'             # 替换为你的API Key
      api_secret: 'REDACTED_API_SECRET' # 替换为你的API Secret
      enabled: true

# 本地开发环境覆盖
environment:
  name: "local"
  debug: true

