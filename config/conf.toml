# 策略工具箱 - 通用配置文件
# 此文件提交到版本控制，包含通用配置和占位符

# ============================================================
# 基础配置
# ============================================================
[app]
name = "策略工具箱"
version = "0.2.0-dev"
mode = "test"                # test/backtest/live

# ============================================================
# 环境配置
# ============================================================
[environment]
name = "development"         # development/test/production
debug = true

# ============================================================
# 策略配置 (支持多策略)
# ============================================================
# 每个策略一项，通过 --strategy 参数名匹配 (e.g. python main.py backtest --strategy ma)
[[strategies]]
name = "ma"                   # 均线交叉策略
enabled = true
sma_short = 10                # 短期均线周期
sma_long = 40                 # 长期均线周期
stop_loss_ratio = 0.1        # 止损比例 (10%)
take_profit_ratio = 0.2      # 止盈比例 (20%)
position_ratio = 0.3          # 仓位比例 (10%)
kline_period = 1              # K线周期 (分钟)
atr_period = 14               # ATR 指标计算周期
atr_stop_loss_multiplier = 1.5 # ATR 止损倍数（亏损超过 atr * multiplier 时止损）
atr_take_profit_multiplier = 1.5 # ATR 止盈倍数（盈利超过 atr * multiplier 时止盈）
kdj_oversold = 30             # KDJ 超卖阈值
kdj_overbought = 70           # KDJ 超买阈值
trailing_activation_atr = 1.0  # 移动止损激活阈值（浮盈超过 atr * 此值时激活追踪止损）
trailing_drawdown_ratio = 0.25 # 移动止损回撤比例（从最高点回落此比例时触发平仓）

  # 参数搜索空间 (同时支持 grid 和 bayesian 模式)
  [strategies.search_space.atr_stop_loss_multiplier]
  type = "float"
  low = 2.6
  high = 3.0
  step = 0.1

  [strategies.search_space.atr_take_profit_multiplier]
  type = "float"
  low = 2.3
  high = 2.7
  step = 0.1

  [strategies.search_space.trailing_activation_atr]
  type = "float"
  low = 0.7
  high = 1.1
  step = 0.1

  [strategies.search_space.trailing_drawdown_ratio]
  type = "float"
  low = 0.1
  high = 0.3
  step = 0.1

  [strategies.search_space.kdj_oversold]
  type = "int"
  low = 23
  high = 27
  step = 1

  [strategies.search_space.kdj_overbought]
  type = "int"
  low = 58
  high = 62
  step = 1

# 未来可扩展更多策略:
# [[strategies]]
# name = "rsi"
# enabled = false
# rsi_period = 14
# overbought = 70
# oversold = 30
# stop_loss_ratio = 0.03
# take_profit_ratio = 0.05
# position_ratio = 0.1

# ============================================================
# 数据配置 (数据源 + 存储 + 导出)
# ============================================================
[data]
provider = "akshare"                        # export 默认数据源
cache_enabled = false                        # 是否启用缓存
base_dir = ".quant_shared_data"              # 数据基础目录
export_dir = ".quant_shared_data/csv"        # CSV 导出目录
db_path = ".quant_shared_data/quant_shared.db"  # 数据库路径
filename_template = "{symbol}.{provider}.{interval}.csv"  # 文件名模板：标的名.数据源.周期.csv

# ============================================================
# 第三方服务配置
# ============================================================
[[third_party.services]]
name = "tqsdk"                  # 天勤量化
provider = "tianqin"            # 提供商
api_key = "PLACEHOLDER_API_KEY" # 请在 config/conf.local.toml 中填写真实密钥
api_secret = "PLACEHOLDER_API_SECRET"
enabled = true
# 未来可扩展更多服务：
# [[third_party.services]]
# name = "binance"
# provider = "binance"
# api_key = ""
# api_secret = ""
# enabled = false
# [[third_party.services]]
# name = "netease"
# provider = "netease"
# api_key = ""
# api_secret = ""
# enabled = false

# ============================================================
# vn.py 回测配置
# ============================================================
[backtest]
initial_capital = 100_000.0     # 初始资金
commission_rate = 0.0003        # 手续费率 (0.03%)
slippage = 1                    # 滑点 (跳)
price_tick = 1                  # 最小价格变动
contract_size = 5               # 合约乘数
interval = "1m"                 # K线周期: 1m/5m/15m/30m/1h/d
provider = ""                   # 回测优先数据源 (空=自动遍历所有)

# ============================================================
# 系统配置
# ============================================================
[system]
modules = []               # 未来可扩展：
                          # - visualization: 可视化
                          # - alerts: 报警通知

[system.logging]
level = "INFO"
# loguru 格式: {time}, {level}, {name}, {function}, {line}, {message}
format = "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level: <8} | {name}:{function}:{line} | {message}"

# ============================================================
# 参数优化器配置
# ============================================================
[optimizer]
enabled = true
engine = "bayesian"                 # grid: 穷举搜索 | bayesian: 贝叶斯优化
n_trials = 20                       # optuna 最大试验次数
use_fixed_seed = false              # 是否使用固定随机种子（默认false，即随机）
random_seed = 42                    # 固定随机种子值（仅在use_fixed_seed=true时有效）
# 注意: n_jobs 已永久固定为 1，vnpy 引擎非线程安全，不支持并行。
