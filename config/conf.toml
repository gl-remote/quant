# 天勤量化交易系统 - 通用配置文件
# 此文件提交到版本控制，包含通用配置和占位符

# ============================================================
# 基础配置
# ============================================================
[app]
name = "天勤量化交易系统"
version = "0.2.0-dev"
mode = "test"                # test/backtest/live

# ============================================================
# 环境配置
# ============================================================
[environment]
name = "development"         # development/test/production
debug = true

# ============================================================
# 策略配置 (支持多策略)
# ============================================================
# 每个策略一项，通过 --strategy 参数名匹配 (e.g. python main.py backtest --strategy ma)
[[strategies]]
name = "ma"                   # 均线交叉策略
enabled = true
sma_short = 5                 # 短期均线周期
sma_long = 20                 # 长期均线周期
stop_loss_ratio = 0.03        # 止损比例 (3%)
take_profit_ratio = 0.05      # 止盈比例 (5%)
position_ratio = 0.1          # 仓位比例 (10%)
kline_period = 5              # K线周期 (分钟)
# 未来可扩展更多策略:
# [[strategies]]
# name = "rsi"
# enabled = false
# rsi_period = 14
# overbought = 70
# oversold = 30
# stop_loss_ratio = 0.03
# take_profit_ratio = 0.05
# position_ratio = 0.1

# ============================================================
# 数据源与存储配置
# ============================================================
[data]
provider = "tqsdk"
cache_enabled = false
base_dir = ".quant_shared_data"
export_dir = ".quant_shared_data/csv"
db_path = ".quant_shared_data/quant_shared.db"

# ============================================================
# 数据导出配置
# ============================================================
[export]
default_dir = ".quant_shared_data/csv"
filename_template = "{symbol}.{interval}.csv"  # 标准命名：标的名.数据周期.csv

# ============================================================
# 第三方服务配置
# ============================================================
[[third_party.services]]
name = "tqsdk"                  # 天勤量化
provider = "tianqin"            # 提供商
api_key = "PLACEHOLDER_API_KEY" # 请在 config/conf.local.toml 中填写真实密钥
api_secret = "PLACEHOLDER_API_SECRET"
enabled = true
# 未来可扩展更多服务：
# [[third_party.services]]
# name = "binance"
# provider = "binance"
# api_key = ""
# api_secret = ""
# enabled = false
# [[third_party.services]]
# name = "netease"
# provider = "netease"
# api_key = ""
# api_secret = ""
# enabled = false

# ============================================================
# vn.py 回测配置
# ============================================================
[backtest]
data_dir = ".quant_shared_data/csv"
initial_capital = 100_000.0     # 初始资金
commission_rate = 0.0003        # 手续费率 (0.03%)
slippage = 1                    # 滑点 (跳)
price_tick = 1                  # 最小价格变动
contract_size = 10              # 合约乘数
interval = "1m"                 # K线周期: 1m/5m/15m/30m/1h/d

# ============================================================
# 回测数据切分配置
# ============================================================
[backtest.split]
train_ratio = 0.7
val_ratio = 0.15
test_ratio = 0.15
random_seed = 42
shuffle = false

# ============================================================
# 系统配置
# ============================================================
[system]
modules = []               # 未来可扩展：
                          # - visualization: 可视化
                          # - alerts: 报警通知

[system.logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
