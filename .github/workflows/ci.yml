name: CI

on:
  push:
    branches: [main, dev/**]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov pandas numpy pyyaml peewee pandera loguru optuna typing_extensions pyarrow pandas-ta akshare plotly matplotlib
          pip install -e .

      - name: Lint with ruff
        run: ruff check .
        # 不用 continue-on-error，lint 失败应阻断 CI

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy common/ data/ backtest/ strategies/

      - name: Test with pytest
        run: pytest tests/ --cov=. --cov-report=term --cov-fail-under=60
