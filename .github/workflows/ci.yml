name: CI

on:
  push:
    branches: [main, dev/**]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: report/web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov pandas numpy pyyaml peewee pandera loguru optuna typing_extensions pyarrow pandas-ta akshare plotly matplotlib
          pip install -e .

      - name: Install frontend dependencies
        working-directory: report/web
        run: npm ci

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy common/ data/ backtest/ strategies/

      - name: Test with pytest
        run: pytest tests/ --cov=. --cov-report=term --cov-fail-under=60

      - name: Frontend lint
        working-directory: report/web
        run: npm run lint

      - name: Frontend tests
        working-directory: report/web
        run: npm test -- --run

      - name: Frontend build
        working-directory: report/web
        run: npm run build
