name: CI

on:
  push:
    branches: [main, dev/**]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workspace/report/web/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Install frontend dependencies
        working-directory: workspace/report/web
        run: npm ci

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Type check with mypy
        # ruff 已做全仓库 lint+format（见上两步）；mypy 做源包静态类型检查，覆盖全部 7 个业务域。
        # 注意：workspace/tests/ 暂不纳入 mypy（见 A20 备注），避免把测试注解负担混入源门禁。
        run: uv run mypy workspace/common/ workspace/data/ workspace/backtest/ workspace/strategies/ workspace/cli/ workspace/config/ workspace/report/

      - name: Test with pytest
        run: uv run pytest workspace/tests/ --cov=. --cov-report=term --cov-fail-under=60

      - name: Frontend lint
        working-directory: workspace/report/web
        run: npm run lint

      - name: Frontend tests
        working-directory: workspace/report/web
        run: npm test -- --run

      - name: Frontend build
        working-directory: workspace/report/web
        run: npm run build
