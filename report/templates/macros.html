{% macro table(headers, rows) %}
<table>
<thead><tr>{% for h in headers %}<th>{{ h }}</th>{% endfor %}</tr></thead>
<tbody>{{ caller() }}</tbody>
</table>
{% endmacro %}

{% macro card(label, value, color='#333') %}
<div class="card">
  <div class="card-label">{{ label }}</div>
  <div class="card-value" style="color:{{ color }}">{{ value }}</div>
</div>
{% endmacro %}
