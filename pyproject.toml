[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quant"
version = "0.0.3"
description = "天勤量化交易系统 - 均线交叉策略回测与实盘"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Financial and Insurance Industry",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]

dependencies = [
    "tqsdk==3.0.0",
    "vnpy==3.8.0",
    "vnpy_ctastrategy==1.2.0",
    "pandas>=2.0",
    "numpy>=1.24",
    "pyyaml>=6.0",
    "matplotlib>=3.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-cov>=4.1",
    "flake8>=6.1",
    "pylint>=2.17",
    "mypy>=1.5",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
addopts = "-v --tb=short --strict-markers --cov=. --cov-report=term-missing --cov-report=html --cov-config=.coveragerc"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "core: tests for strategy core module",
    "config: tests for config manager",
    "loader: tests for data loader",
    "database: tests for database module",
]

[tool.flake8]
max-line-length = 120
extend-ignore = ["E203", "E501", "W503"]
exclude = [".git", "__pycache__", ".venv", "htmlcov"]

[tool.pylint.main]
ignore = ["htmlcov"]
jobs = 0

[tool.pylint.format]
max-line-length = 120

[tool.pylint.messages_control]
disable = [
    "missing-module-docstring",
    "missing-class-docstring",
    "missing-function-docstring",
    "too-few-public-methods",
    "invalid-name",
]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
disallow_untyped_defs = false